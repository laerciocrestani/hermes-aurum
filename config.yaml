# Aurum profile config — versioned in this repo.
# Secrets (API keys, bot tokens) go in ~/.hermes/profiles/aurum/.env

model:
  # Free tier on OpenRouter. Override with: aurum config set model.default <slug>
  default: "stepfun/step-3.7-flash:free"
  provider: openrouter

agent:
  max_turns: 30
  reasoning_effort: low

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.50

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]

stt:
  enabled: true
