# Config do perfil Aurum — versionado neste repositório.
# Segredos (API keys, tokens de bot) vão em ~/.hermes/profiles/aurum/.env

model:
  # Primário: modelo mais leve (menos 503). Fallback: flash quando lite estiver sobrecarregado.
  # Sobrescrever com: aurum config set model.default <slug>
  default: gemini-2.5-flash-lite
  provider: gemini
  base_url: https://generativelanguage.googleapis.com/v1beta

fallback_providers:
  - provider: gemini
    model: gemini-2.5-flash

agent:
  max_turns: 30
  reasoning_effort: low

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.50

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

display:
  # Telegram: enfileira mensagens enquanto o agente trabalha (evita cortar clarify/ledger).
  busy_input_mode: queue

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]

stt:
  enabled: true
