# Aurum profile config — versioned in this repo.
# Secrets (API keys, bot tokens) go in ~/.hermes/profiles/aurum/.env

model:
  # Day-to-day Telegram: reliable tool calling for ledger scripts.
  # Override with: aurum config set model.default <slug>
  default: gemini-2.5-flash
  provider: gemini
  base_url: https://generativelanguage.googleapis.com/v1beta

agent:
  max_turns: 30
  reasoning_effort: low

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.50

session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]

stt:
  enabled: true
