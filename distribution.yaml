name: aurum
version: 1.0.0
description: "Event-sourced personal finance agent — ledger, reports, and on-demand mentoring"
hermes_requires: ">=0.12.0"
author: "Laercio Crestani"
license: MIT

env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key (required for stepfun/step-3.7-flash:free)"
    required: true
  - name: TELEGRAM_BOT_TOKEN
    description: "Bot token from @BotFather (only if using Telegram gateway)"
    required: false
  - name: TELEGRAM_ALLOWED_USERS
    description: "Your Telegram user ID from @userinfobot (only if using Telegram)"
    required: false
